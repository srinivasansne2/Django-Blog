<header class="p-3 bg-dark text-white">
        <div class="row">
            <div class="col">
                <a href="/" class="text-light text-decoration-none"> <h3>Blog</h3> </a>
            </div>
            <div class="col">
                <div class="d-flex justify-content-center gap-3">
                    <a class="text-light text-decoration-none" href="/">Home</a>
                    <a class="text-light text-decoration-none" href="{% url 'about' %}">About</a>
                    <a class="text-light text-decoration-none" href="{% url 'contact' %}">Contact</a>
                    {% if user.is_authenticated %}
                    <a class="text-light text-decoration-none" href="{% url "blog:dashboard" %}">Dashboard</a>
                    <a class="text-light text-decoration-none" href="{% url "blog:logout" %}">Logout</a>
                    {% else %}
                    <a class="text-light text-decoration-none" href="{% url "blog:login" %}">login</a>
                    <a class="text-light text-decoration-none" href="{% url "blog:register" %}">Register</a>
                    {% endif %}

                </div>
            </div>
        </div>
</header>
